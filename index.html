<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Akıllı Çalışma ve Sosyal Alan</title>
  <meta name="theme-color" content="#4f46e5">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    :root {
      --primary: #4f46e5;
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --text-muted: #64748b;
      --color-ders: #34d399;
      --color-eglence: #f43f5e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif; }
    body { background-color: var(--bg); color: var(--text); padding: 15px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .container { background: var(--card); padding: 25px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.03); width: 100%; max-width: 400px; text-align: center; }
    
    .app-container { background: transparent; width: 100%; max-width: 1100px; display: grid; grid-template-columns: 1fr; gap: 15px; }
    @media (min-width: 768px) {
      .app-container { grid-template-columns: 1fr 1fr 1.1fr; }
    }
    
    .panel { background: white; padding: 18px; border-radius: 20px; box-shadow: 0 4px 20px rgba(15, 23, 42, 0.02); display: flex; flex-direction: column; min-height: 450px; text-align: left; }
    h2, h3 { margin-bottom: 4px; font-weight: 700; color: #1e293b; font-size: 16px; }
    .subtitle { color: var(--text-muted); font-size: 12px; margin-bottom: 12px; }
    
    .form-group { margin-bottom: 14px; text-align: left; }
    label { display: block; font-size: 12px; margin-bottom: 4px; font-weight: 600; color: #475569; }
    input { width: 100%; padding: 10px 12px; border: 1.5px solid #e2e8f0; border-radius: 10px; font-size: 14px; outline: none; color: var(--text); }
    button { width: 100%; padding: 12px; background-color: var(--primary); color: white; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .hidden { display: none !important; }
    
    .alert { padding: 10px; border-radius: 8px; font-size: 13px; margin-bottom: 14px; text-align: center; display: none; font-weight: 500; }
    .alert-error { background-color: #fef2f2; color: #991b1b; border: 1px solid #fee2e2; }
    .alert-success { background-color: #f0fdf4; color: #166534; border: 1px solid #dcfce7; }

    .chat-box { border: 1px solid #f1f5f9; flex: 1; overflow-y: auto; padding: 10px; border-radius: 10px; margin-bottom: 10px; background: #f8fafc; max-height: 250px; }
    .msg { margin-bottom: 8px; font-size: 13px; background: #f1f5f9; padding: 8px 10px; border-radius: 10px; width: fit-content; max-width: 85%; line-height: 1.3; }
    .msg.me { background: #e0e7ff; color: #1e1b4b; margin-left: auto; }
    .msg-sender { font-weight: 700; font-size: 10px; color: var(--text-muted); display: block; margin-bottom: 2px; cursor: pointer; }

    .leaderboard-list { flex: 1; overflow-y: auto; border: 1px solid #f1f5f9; border-radius: 10px; padding: 8px; background: #f8fafc; max-height: 250px; }
    .leaderboard-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid #e2e8f0; font-size: 12px; }
    .user-badge { font-weight: 600; color: #334155; cursor: pointer; }

    .timer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
    .timer-card { background: #f8fafc; border: 1.5px solid #f1f5f9; padding: 10px; border-radius: 10px; text-align: center; }
    .timer-label { font-weight: 700; font-size: 11px; display: block; margin-bottom: 2px; }
    .timer-time { font-size: 18px; font-weight: 800; color: #0f172a; margin-bottom: 6px; }
    .btn-timer { padding: 6px 8px; font-size: 11px; border-radius: 6px; width: auto; }
    .btn-ders { background-color: var(--color-ders); color: #064e3b; }
    .btn-eglence { background-color: var(--color-eglence); color: #fff1f2; }
    .btn-stop { background-color: #64748b; color: white; }

    .iphone-stats-card { background: #ffffff; border: 1.5px solid #f1f5f9; border-radius: 12px; padding: 10px; }
    .iphone-average-title { font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }
    .iphone-average-value { font-size: 20px; font-weight: 800; color: var(--text); margin-bottom: 8px; }
    .chart-container { position: relative; height: 110px; width: 100%; }
  </style>
</head>
<body>

  <!-- GİRİŞ / KAYIT EKRANI -->
  <div class="container" id="authContainer">
    <div id="alertBox" class="alert"></div>
    <h2 id="authTitle">Giriş Yap</h2>
    <p class="subtitle" id="authSubtitle">Şifrenle giriş yap veya yeni hesap oluştur.</p>
    
    <form onsubmit="handleAuth(event)">
      <div class="form-group">
        <label>Kullanıcı Adı</label>
        <input type="text" id="usernameInput" required placeholder="Örn: Eymen">
      </div>
      <div class="form-group">
        <label>Şifre</label>
        <input type="password" id="passwordInput" required placeholder="Şifren">
      </div>
      <button type="submit" id="authBtn">Giriş Yap</button>
    </form>
    
    <p style="margin-top: 14px; font-size: 12px; color: var(--text-muted);">
      <span id="toggleText">Hesabın yok mu?</span> 
      <a href="#" onclick="toggleAuthMode(); return false;" style="color: var(--primary); font-weight: 600; text-decoration: none;" id="toggleLink">Kayıt Ol</a>
    </p>
  </div>

  <!-- ANA UYGULAMA PANELİ -->
  <div class="app-container hidden" id="appMainPanel">
    
    <!-- SOHBET -->
    <div class="panel">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
        <h3 id="chatHeaderTitle" style="margin:0;">💬 Genel Sohbet</h3>
        <button id="backToGeneralBtn" class="hidden" onclick="switchChatMode('general')" style="width: auto; padding: 3px 8px; font-size: 10px; background:#64748b;">Genel'e Dön</button>
      </div>
      
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
        <p class="subtitle" id="userWelcomeText" style="margin:0;"></p>
        <button onclick="logout()" style="width: auto; padding: 4px 10px; font-size: 11px; background-color: #ef4444;">Çıkış Yap</button>
      </div>

      <div class="chat-box" id="chatBox"></div>
      <div style="display:flex; gap:6px;">
        <input type="text" id="msgInput" placeholder="Mesaj yaz..." onkeypress="if(event.key==='Enter') sendChat()">
        <button onclick="sendChat()" style="width:70px;">Gönder</button>
      </div>
    </div>

    <!-- LİDERLİK -->
    <div class="panel">
      <h3>🏆 Arkadaş Liderliği</h3>
      <p class="subtitle">Herkesin toplam süreleri.</p>
      <div class="leaderboard-list" id="leaderboardList"></div>
    </div>

    <!-- EKRAN SÜRESİ -->
    <div class="panel">
      <h3>📊 Ekran Süresi</h3>
      <p class="subtitle">Haftalık detaylı ortalama dağılımın.</p>
      
      <div class="timer-grid">
        <div class="timer-card">
          <span class="timer-label" style="color: #059669;">📚 Ders</span>
          <div class="timer-time" id="time-Ders">00:00</div>
          <button id="btn-Ders" class="btn-timer btn-ders" onclick="toggleTimer('Ders')">Başlat</button>
        </div>
        <div class="timer-card">
          <span class="timer-label" style="color: #e11d48;">🎮 Eğlence</span>
          <div class="timer-time" id="time-Eglence">00:00</div>
          <button id="btn-Eglence" class="btn-timer btn-eglence" onclick="toggleTimer('Eglence')">Başlat</button>
        </div>
      </div>

      <div class="iphone-stats-card">
        <div class="iphone-average-title">Günlük Ortalama</div>
        <div class="iphone-average-value" id="avgDisplay">0 dk</div>
        <div class="chart-container">
          <canvas id="iphoneBarChart"></canvas>
        </div>
      </div>
    </div>

  </div>

  <script>
    const SUPABASE_URL = "https://yqhdgogfxcycjilfillb.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_aJVa7IVB6HfcQYug4JNeow_RwnGZaB7";
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    const WEB3FORMS_KEY = "387c3113-1e0f-4f5c-ad17-4bf2a9ca3170"; 
    
    let currentUserName = localStorage.getItem("chat_username") || "";
    let isRegisterMode = false;
    let activeChatPartner = null;
    let activeType = null;
    let timerInterval = null;
    let secondsElapsed = 0;
    let myChart = null;

    window.addEventListener('DOMContentLoaded', () => {
      if (currentUserName) {
        enterApp(currentUserName);
      }
    });

    function showAlert(message, type = 'error') {
      const alertBox = document.getElementById("alertBox");
      alertBox.textContent = message;
      alertBox.className = `alert alert-${type}`;
      alertBox.style.display = "block";
    }

    function toggleAuthMode() {
      isRegisterMode = !isRegisterMode;
      document.getElementById("alertBox").style.display = "none";
      document.getElementById("authTitle").textContent = isRegisterMode ? "Kayıt Ol" : "Giriş Yap";
      document.getElementById("authSubtitle").textContent = isRegisterMode ? "Hesap oluştur, yönetici onayından sonra girebilirsin." : "Şifrenle giriş yap.";
      document.getElementById("authBtn").textContent = isRegisterMode ? "Kayıt Ol" : "Giriş Yap";
      document.getElementById("toggleText").textContent = isRegisterMode ? "Zaten hesabın var mı?" : "Hesabın yok mu?";
      document.getElementById("toggleLink").textContent = isRegisterMode ? "Giriş Yap" : "Kayıt Ol";
    }

    async function handleAuth(e) {
      e.preventDefault();
      const name = document.getElementById("usernameInput").value.trim();
      const password = document.getElementById("passwordInput").value.trim();
      if (!name || !password) return;

      if (isRegisterMode) {
        // RLS veya önbellek engeline takılmamak için doğrudan ekleme deniyoruz.
        // Eğer veritabanında unique kısıtlaması varsa hata dönecektir, yoksa doğrudan ekler.
        let { error } = await _supabase.from('app_users').insert([{ name: name, password: password, is_approved: false }]);
        
        if (error) {
          // Eğer hata benzersizlik (unique) kısıtlamasından kaynaklanıyorsa kullanıcı zaten vardır
          if (error.code === '23505' || error.message.includes('duplicate') || error.message.includes('already exists')) {
            showAlert("Bu kullanıcı adı zaten alınmış!", 'error');
          } else {
            showAlert("Kayıt oluşturulurken hata oluştu: " + error.message, 'error');
          }
          return;
        }

        try {
          await fetch("https://api.web3forms.com/submit", {
            method: "POST",
            headers: { "Content-Type": "application/json", "Accept": "application/json" },
            body: JSON.stringify({
              access_key: WEB3FORMS_KEY,
              subject: `Yeni Kullanıcı Kayıt Başvurusu: ${name}`,
              message: `Yeni bir kullanıcı kayıt olmak istiyor.\n\nKullanıcı Adı: ${name}\n\nBu kullanıcıyı onaylamak için Supabase paneline giriş yapıp app_users tablosundan is_approved değerini true yapabilirsiniz.`
            })
          });
        } catch (mailErr) {
          console.error("Mail gönderilemedi:", mailErr);
        }

        showAlert("Kayıt başarılı! Yönetici onayından sonra giriş yapabilirsin.", 'success');
      } else {
        let { data: user, error } = await _supabase.from('app_users').select('*').eq('name', name).maybeSingle();

        if (!user || user.password !== password) {
          showAlert("Hatalı kullanıcı adı veya şifre!", 'error');
          return;
        }

        if (user.is_approved === false || user.is_approved === null) {
          showAlert("Hesabınız henüz onaylanmadı. Lütfen yöneticinin onaylamasını bekleyin.", 'error');
          return;
        }

        localStorage.setItem("chat_username", name);
        enterApp(name);
      }
    }

    function enterApp(name) {
      currentUserName = name;
      document.getElementById("authContainer").classList.add("hidden");
      document.getElementById("appMainPanel").classList.remove("hidden");
      document.getElementById("userWelcomeText").textContent = `Oturum: ${currentUserName}`;
      initApp();
    }

    function logout() {
      localStorage.removeItem("chat_username");
      location.reload();
    }

    function initApp() {
      loadMessages();
      loadLeaderboard();
      loadStats();
      setInterval(() => {
        loadMessages();
        loadLeaderboard();
      }, 3000);
    }

    function switchChatMode(partnerName) {
      activeChatPartner = partnerName === 'general' ? null : partnerName;
      document.getElementById("chatHeaderTitle").textContent = activeChatPartner ? `🔒 ${activeChatPartner}` : "💬 Genel Sohbet";
      const backBtn = document.getElementById("backToGeneralBtn");
      if (activeChatPartner) backBtn.classList.remove("hidden");
      else backBtn.classList.add("hidden");
      loadMessages();
    }

    async function loadMessages() {
      const { data } = await _supabase.from('messages').select('*').order('id', { ascending: true });
      if (!data) return;

      const chatBox = document.getElementById("chatBox");
      const isAtBottom = chatBox.scrollHeight - chatBox.clientHeight <= chatBox.scrollTop + 50;
      chatBox.innerHTML = "";

      data.forEach(m => {
        const isDirect = m.recipient && ((m.email === currentUserName && m.recipient === activeChatPartner) || (m.email === activeChatPartner && m.recipient === currentUserName));
        const isGeneral = !m.recipient && activeChatPartner === null;

        if (isDirect || isGeneral) {
          const isMe = m.email === currentUserName;
          const div = document.createElement("div");
          div.className = `msg ${isMe ? 'me' : ''}`;
          div.innerHTML = `<span class="msg-sender" onclick="switchChatMode('${m.email}')">${m.email}</span>${m.text}`;
          chatBox.appendChild(div);
        }
      });
      if (isAtBottom) chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function sendChat() {
      const input = document.getElementById("msgInput");
      const text = input.value.trim();
      if (!text) return;

      input.value = "";
      const payload = { email: currentUserName, text: text };
      if (activeChatPartner) payload.recipient = activeChatPartner;

      await _supabase.from('messages').insert([payload]);
      loadMessages();
    }

    async function loadLeaderboard() {
      const { data } = await _supabase.from('time_logs').select('email, duration_minutes');
      const listEl = document.getElementById("leaderboardList");
      if (!data) return;

      let userTotals = {};
      data.forEach(log => { userTotals[log.email] = (userTotals[log.email] || 0) + log.duration_minutes; });

      listEl.innerHTML = "";
      Object.keys(userTotals).forEach(name => {
        const total = userTotals[name];
        const sa = Math.floor(total / 60);
        const dk = total % 60;
        const timeStr = sa > 0 ? `${sa} sa ${dk} dk` : `${dk} dk`;

        const div = document.createElement("div");
        div.className = "leaderboard-item";
        div.innerHTML = `<span class="user-badge" onclick="switchChatMode('${name}')">👤 ${name}</span><strong style="color:var(--primary);">${timeStr}</strong>`;
        listEl.appendChild(div);
      });
    }

    function toggleTimer(type) {
      const targetBtn = document.getElementById(`btn-${type}`);
      if (activeType === type) {
        clearInterval(timerInterval);
        const mins = Math.round(secondsElapsed / 60) || 1;
        saveTimeLog(activeType, mins);
        targetBtn.textContent = "Başlat";
        targetBtn.className = `btn-timer btn-${type.toLowerCase()}`;
        document.getElementById(`time-${type}`).textContent = "00:00";
        activeType = null;
        secondsElapsed = 0;
      } else {
        if (activeType) toggleTimer(activeType);
        activeType = type;
        secondsElapsed = 0;
        targetBtn.textContent = "Durdur";
        targetBtn.className = "btn-timer btn-stop";
        timerInterval = setInterval(() => {
          secondsElapsed++;
          const m = String(Math.floor(secondsElapsed / 60)).padStart(2, '0');
          const s = String(secondsElapsed % 60).padStart(2, '0');
          document.getElementById(`time-${type}`).textContent = `${m}:${s}`;
        }, 1000);
      }
    }

    async function saveTimeLog(type, mins) {
      await _supabase.from('time_logs').insert([{ email: currentUserName, activity_type: type, duration_minutes: mins }]);
      loadStats();
      loadLeaderboard();
    }

    async function loadStats() {
      const { data } = await _supabase.from('time_logs').select('created_at, activity_type, duration_minutes').eq('email', currentUserName);
      const gunEtiketleri = ['Pzt', 'Sal', 'Çar', 'Per', 'Cum', 'Cmt', 'Paz'];
      let dList = [0,0,0,0,0,0,0], eList = [0,0,0,0,0,0,0];
      let toplam = 0, aktifGun = new Set();

      if (data) {
        data.forEach(l => {
          const t = new Date(l.created_at);
          let idx = t.getDay() - 1; if (idx === -1) idx = 6;
          toplam += l.duration_minutes;
          aktifGun.add(t.toISOString().split('T')[0]);
          if (l.activity_type === 'Ders') dList[idx] += l.duration_minutes;
          else eList[idx] += l.duration_minutes;
        });
      }

      const ort = Math.round(toplam / (aktifGun.size || 1));
      document.getElementById("avgDisplay").textContent = ort >= 60 ? `${Math.floor(ort/60)} sa ${ort%60} dk` : `${ort} dk`;

      const ctx = document.getElementById('iphoneBarChart').getContext('2d');
      if (myChart) {
        myChart.data.datasets[0].data = dList;
        myChart.data.datasets[1].data = eList;
        myChart.update();
      } else {
        myChart = new Chart(ctx, {
          type: 'bar',
          data: {
            labels: gunEtiketleri,
            datasets: [
              { label: 'Ders', data: dList, backgroundColor: '#34d399', borderRadius: 4 },
              { label: 'Eğlence', data: eList, backgroundColor: '#f43f5e', borderRadius: 4 }
            ]
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            scales: {
              x: { stacked: true, grid: { display: false } },
              y: { stacked: true, grid: { color: '#f1f5f9' }, ticks: { callback: v => v + 'dk' } }
            },
            plugins: { legend: { display: false } }
          }
        });
      }
    }
  </script>
</body>
</html>
